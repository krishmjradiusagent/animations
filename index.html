<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Fade — Light &amp; Dark</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /*
      THE KEY: CSS custom property for the fade color.
      This is the ONLY thing you need to change per theme.
    */
    :root {
      --page-bg: #ffffff;
    }
    .dark {
      --page-bg: #0a0620;
    }

    /* Carousel edge fades — theme-aware via var(--page-bg) */
    .carousel-fade {
      position: relative;
    }
    .carousel-fade::before,
    .carousel-fade::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 72px;
      z-index: 10;
      pointer-events: none;
      transition: background 0.3s ease;
    }
    .carousel-fade::before {
      left: 0;
      background: linear-gradient(to right, var(--page-bg) 0%, var(--page-bg) 8%, transparent 100%);
    }
    .carousel-fade::after {
      right: 0;
      background: linear-gradient(to left, var(--page-bg) 0%, var(--page-bg) 8%, transparent 100%);
    }
  </style>
</head>
<body class="bg-white dark:bg-[#0a0620] text-slate-900 dark:text-slate-100 font-sans min-h-screen antialiased transition-colors duration-300">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SparklesIcon = () => (
      <svg className="w-3.5 h-3.5 text-violet-200 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21L7.188 15.904L2 15L7.188 14.096L9 9L9.813 14.096L15 15L9.813 15.904z" />
      </svg>
    );

    const SunIcon = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
      </svg>
    );

    const MoonIcon = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
      </svg>
    );

    const demoCards = [
      { category: "LANGUAGE", tag: "Language Support", title: "Can you communicate with my client in Mandarin Chinese?", subtitle: "Should I save this language preference as the default for all interactions with this client?" },
      { category: "COMMUNICATION", tag: "Client Communication", title: "Text my client a reminder about our meeting tomorrow at 3 PM", subtitle: "Would you like to include a property link or confirmation request?" },
      { category: "COMMUNICATION", tag: "Client Communication", title: "Email the BRBC to my client along with a brief explanation of the document", subtitle: "Would you like to add a personal note or video message to accompany the BRBC?" },
      { category: "CMA", tag: "CMA & Valuation", title: "Generate a quick home value estimate for an address my client is considering", subtitle: "Should I compare this estimate with Zestimate and other AVM tools?" },
      { category: "OFFERS", tag: "Offer Management", title: "Initiate an offer for a client who wants to bid on a listing", subtitle: "Should I notify you of feedback or a counter received?" },
      { category: "LEADS", tag: "Lead Intelligence", title: "Identify cold leads in my database that need outreach", subtitle: "Create a smart campaign for re-engagement?" },
    ];

    function Card({ card }) {
      return (
        <div className="min-w-[260px] max-w-[260px] bg-gradient-to-br from-violet-600 to-indigo-700 rounded-xl p-5 shadow-lg shadow-violet-300/30 dark:shadow-violet-900/30 flex flex-col justify-between h-[190px] group hover:-translate-y-0.5 transition-transform duration-200 cursor-pointer">
          <div>
            <div className="flex items-center text-[10px] font-bold text-violet-200/80 tracking-wider uppercase mb-2.5">
              <SparklesIcon />
              {card.category}
            </div>
            <p className="text-[10px] text-violet-300/70 mb-1">{card.tag}</p>
            <h3 className="text-[13px] font-semibold text-white leading-snug">{card.title}</h3>
            <p className="text-[11px] text-violet-200/60 mt-2 line-clamp-2 leading-relaxed italic">{card.subtitle}</p>
          </div>
        </div>
      );
    }

    function Carousel({ cards }) {
      const ref = useRef(null);
      const [isScrolling, setIsScrolling] = useState(true);

      useEffect(() => {
        if (!isScrolling) return;
        const id = setInterval(() => {
          if (ref.current) {
            const { scrollLeft, scrollWidth, clientWidth } = ref.current;
            if (scrollLeft + clientWidth >= scrollWidth - 5) {
              ref.current.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
              ref.current.scrollBy({ left: 1.2, behavior: 'auto' });
            }
          }
        }, 30);
        return () => clearInterval(id);
      }, [isScrolling]);

      return (
        /* carousel-fade class adds the ::before and ::after
           overlays using var(--page-bg) — seamless in any theme */
        <div className="carousel-fade w-[94%] mx-auto">
          <div
            ref={ref}
            onMouseEnter={() => setIsScrolling(false)}
            onMouseLeave={() => setIsScrolling(true)}
            className="py-5 flex gap-4 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"
          >
            {cards.map((card, i) => <Card key={i} card={card} />)}
          </div>
        </div>
      );
    }

    const styledCode = `/* ── Carousel with theme-aware edge fades ── */

/* 1. Define your page bg as a CSS variable per theme */
:root {
  --page-bg: #ffffff;
}
/* Dark theme — set via class, data-attr, or media query */
.dark {
  --page-bg: #0a0620;
}

/* 2. Styled-component uses pseudo-elements with var(--page-bg) */
export const SuggestionCarousel = styled.div\`
  position: relative;
  overflow: hidden;
  width: 92%;
  margin: 0 auto;
  padding: 20px 0 4px;

  /* Left edge fade */
  &::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 72px;
    /* Starts opaque at the edge, fades to transparent */
    background: linear-gradient(
      to right,
      var(--page-bg) 0%,
      var(--page-bg) 8%,
      transparent 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  /* Right edge fade */
  &::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 72px;
    background: linear-gradient(
      to left,
      var(--page-bg) 0%,
      var(--page-bg) 8%,
      transparent 100%
    );
    z-index: 2;
    pointer-events: none;
  }
\`

/* WHY var(--page-bg) instead of mask-image?
   
   mask-image fades to transparent, which reveals
   whatever bg is underneath. On a purple card over
   white, you get a washed-out purple-white blend.
   
   The overlay approach paints the exact bg color
   OVER the content — no blending artifacts.
   
   var(--page-bg) adapts to any theme automatically.
*/`;

    function App() {
      const [isDark, setIsDark] = useState(false);
      const allCards = [...demoCards, ...demoCards];

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
      }, [isDark]);

      return (
        <div className="max-w-5xl mx-auto px-4 py-10 flex flex-col gap-8">

          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <span className="text-violet-600 dark:text-violet-400 font-semibold tracking-wider text-[11px] uppercase bg-violet-50 dark:bg-violet-950/50 px-3 py-1 rounded-full border border-violet-200 dark:border-violet-800/40">Carousel Fade</span>
              <h1 className="text-2xl font-bold mt-3 tracking-tight">Seamless Edge Fade</h1>
              <p className="text-slate-500 dark:text-slate-400 text-sm mt-1">Works in both light and dark mode — toggle to verify.</p>
            </div>

            {/* Theme Toggle */}
            <button
              onClick={() => setIsDark(!isDark)}
              className="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-xs font-semibold hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer"
            >
              {isDark ? <SunIcon /> : <MoonIcon />}
              {isDark ? 'Light Mode' : 'Dark Mode'}
            </button>
          </div>

          {/* Live Preview */}
          <div className="rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden bg-white dark:bg-[#0a0620] transition-colors duration-300">
            {/* Browser chrome */}
            <div className="px-5 py-3 border-b border-slate-100 dark:border-slate-800 flex items-center gap-2 bg-slate-50 dark:bg-[#0d0826]">
              <span className="w-3 h-3 rounded-full bg-red-400"></span>
              <span className="w-3 h-3 rounded-full bg-amber-400"></span>
              <span className="w-3 h-3 rounded-full bg-emerald-400"></span>
              <span className="text-[11px] text-slate-400 dark:text-slate-500 font-mono ml-2">localhost:3000</span>
            </div>

            {/* Carousel */}
            <div className="bg-white dark:bg-[#0a0620] py-4 transition-colors duration-300">
              <Carousel cards={allCards} />
            </div>
          </div>

          {/* Code + Explanation */}
          <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">

            {/* Code — 3 cols */}
            <div className="lg:col-span-3 flex flex-col gap-2">
              <h2 className="text-sm font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2">
                <svg className="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" /></svg>
                Implementation
              </h2>
              <div className="bg-slate-950 rounded-xl border border-slate-800 p-5 overflow-x-auto">
                <pre className="text-[11px] text-slate-300 leading-relaxed font-mono whitespace-pre select-all">{styledCode}</pre>
              </div>
            </div>

            {/* Explanation — 2 cols */}
            <div className="lg:col-span-2 flex flex-col gap-4">
              <h2 className="text-sm font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2">
                <svg className="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.493 1.509 1.333 1.509 2.316V18" /></svg>
                Why This Works
              </h2>

              <div className="bg-violet-50 dark:bg-violet-950/30 border border-violet-200 dark:border-violet-800/40 p-4 rounded-xl text-[13px] text-slate-700 dark:text-slate-300 leading-relaxed flex flex-col gap-3">
                <p><strong className="text-violet-700 dark:text-violet-400">The problem with <code className="font-mono text-xs bg-violet-100 dark:bg-violet-900/40 px-1 rounded">mask-image</code>:</strong> It fades content to <em>transparent</em>, revealing whatever is behind. Purple cards over white = ugly washed-out purple-white blend at edges.</p>
                <p><strong className="text-violet-700 dark:text-violet-400">The overlay fix:</strong> Pseudo-elements paint your <em>exact page color</em> over the content edges. No blending artifacts — the card simply disappears behind a solid gradient that matches the page perfectly.</p>
                <p><strong className="text-violet-700 dark:text-violet-400">Theme-aware via <code className="font-mono text-xs bg-violet-100 dark:bg-violet-900/40 px-1 rounded">var(--page-bg)</code>:</strong> Define one CSS variable per theme. The gradient adapts automatically — zero JS, zero duplication.</p>
              </div>

              <div className="flex items-start gap-2 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-800/40 rounded-lg p-3 text-xs text-emerald-800 dark:text-emerald-300">
                <svg className="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span>Toggle the theme above to verify — edges stay seamless in both modes.</span>
              </div>

              <div className="text-xs text-slate-500 dark:text-slate-400 flex flex-col gap-1.5 border-t border-slate-100 dark:border-slate-800 pt-4">
                <span className="font-semibold text-slate-600 dark:text-slate-300">Key details:</span>
                <ul className="list-disc pl-4 space-y-1">
                  <li><code className="font-mono text-violet-600 dark:text-violet-400">pointer-events: none</code> — cards stay interactive through the fade</li>
                  <li>The <code className="font-mono text-violet-600 dark:text-violet-400">8%</code> solid stop prevents the gradient from starting too soft</li>
                  <li>72px width gives a premium, gradual falloff</li>
                  <li><code className="font-mono text-violet-600 dark:text-violet-400">transition: background 0.3s</code> on overlays animates theme switches</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
