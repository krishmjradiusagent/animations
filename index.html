<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Fade Transition Demo</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            brand: {
              dark: '#08041d',
              card: '#16103b',
              cardBorder: 'rgba(255, 255, 255, 0.08)',
              accent: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>

  <!-- React, ReactDOM, and Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Scrollbar and base styles -->
  <style>
    /* Custom scrollbar for clean UI */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Code highlight styling */
    pre {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-[#08041d] text-slate-100 font-sans min-h-screen antialiased flex flex-col justify-between overflow-x-hidden selection:bg-violet-500/30 selection:text-violet-200">

  <div id="root" class="w-full flex-grow flex flex-col justify-start"></div>

  <!-- React Component Code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Simulated Lucide Icons for clean visuals
    const SparklesIcon = () => (
      <svg className="w-4 h-4 text-violet-400 mr-2" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21L7.188 15.904L2 15L7.188 14.096L9 9L9.813 14.096L15 15L9.813 15.904z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M19.071 4.929l-.707.707-.707-.707.707-.707.707.707zM17.657 16.243l-.707.707-.707-.707.707-.707.707.707zM6.343 4.929l-.707.707-.707-.707.707-.707.707.707z" />
      </svg>
    );

    const CodeIcon = () => (
      <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
      </svg>
    );

    const EyeIcon = () => (
      <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const CheckIcon = () => (
      <svg className="w-4 h-4 text-emerald-400 mr-2 shrink-0 mt-0.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    );

    const AlertIcon = () => (
      <svg className="w-4 h-4 text-amber-400 mr-2 shrink-0 mt-0.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    );

    const demoCards = [
      {
        category: "SUPPORT",
        title: "Send a message in French-speaking French",
        subtitle: "Should I save this language preference as default?",
        tag: "Language Support"
      },
      {
        category: "LANGUAGE",
        title: "Can you communicate with my client in Mandarin?",
        subtitle: "Would you like to auto-translate inbound messages?",
        tag: "Client Comms"
      },
      {
        category: "COMMUNICATION",
        title: "Text my client a reminder about our meeting",
        subtitle: "Send via SMS or WhatsApp confirmation request?",
        tag: "Client Communication"
      },
      {
        category: "CMA & VALUATION",
        title: "Generate a quick home value estimate",
        subtitle: "Should I compare this estimate with active listings?",
        tag: "CMA & Valuation"
      },
      {
        category: "OFFERS",
        title: "Initiate an offer draft for our client",
        subtitle: "Should I fetch listing info automatically?",
        tag: "Offer Management"
      },
      {
        category: "LEADS",
        title: "Identify cold leads in database needing outreach",
        subtitle: "Create a smart campaign for engagement?",
        tag: "Lead Intelligence"
      }
    ];

    function App() {
      const [fadeType, setFadeType] = useState('good-mask'); // 'bad-white', 'good-mask', 'good-overlay'
      const [isScrolling, setIsScrolling] = useState(true);
      const scrollContainerRef = useRef(null);

      // Auto scroll animation simulation
      useEffect(() => {
        if (!isScrolling) return;
        const interval = setInterval(() => {
          if (scrollContainerRef.current) {
            const { scrollLeft, scrollWidth, clientWidth } = scrollContainerRef.current;
            if (scrollLeft + clientWidth >= scrollWidth - 5) {
              scrollContainerRef.current.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
              scrollContainerRef.current.scrollBy({ left: 1.5, behavior: 'auto' });
            }
          }
        }, 30);
        return () => clearInterval(interval);
      }, [isScrolling]);

      const codeSnippets = {
        'bad-white': `// ❌ BAD: Hardcoded white overlays or mask revealing white background
export const SuggestionCarousel = styled.div\`
  overflow: hidden;
  position: relative;
  width: 90%;
  max-width: 100%;
  margin: 0 auto;
  background: #ffffff; /* ⚠️ The culprit! Exposes white under mask */

  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 48px,
    black calc(100% - 48px),
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 48px,
    black calc(100% - 48px),
    transparent 100%
  );
\``,
        'good-mask': `// ✅ GOOD (Method A): Clean CSS Mask + Transparent Background
export const SuggestionCarousel = styled.div\`
  overflow: hidden;
  position: relative;
  width: 90%;
  max-width: 100%;
  margin: 0 auto;
  background: transparent; /* Clean transparency */

  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 64px,
    black calc(100% - 64px),
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 64px,
    black calc(100% - 64px),
    transparent 100%
  );
\``,
        'good-overlay': `// ✅ GOOD (Method B): Absolute Pseudo-Element Overlays
export const SuggestionCarousel = styled.div\`
  position: relative;
  overflow: hidden;
  width: 90%;
  max-width: 100%;
  margin: 0 auto;

  /* Left Edge Fade: Match your background color */
  &::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 64px;
    background: linear-gradient(to right, #08041d 0%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* Right Edge Fade: Match your background color */
  &::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 64px;
    background: linear-gradient(to left, #08041d 0%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }
\``
      };

      // Styles matching the states
      const getContainerStyles = () => {
        if (fadeType === 'bad-white') {
          return {
            background: '#ffffff',
            WebkitMaskImage: 'linear-gradient(to right, transparent 0%, black 48px, black calc(100% - 48px), transparent 100%)',
            maskImage: 'linear-gradient(to right, transparent 0%, black 48px, black calc(100% - 48px), transparent 100%)'
          };
        } else if (fadeType === 'good-mask') {
          return {
            background: 'transparent',
            WebkitMaskImage: 'linear-gradient(to right, transparent 0%, black 64px, black calc(100% - 64px), transparent 100%)',
            maskImage: 'linear-gradient(to right, transparent 0%, black 64px, black calc(100% - 64px), transparent 100%)'
          };
        }
        // Good overlay has no mask directly on the element (uses pseudo-style simulation)
        return {
          background: 'transparent'
        };
      };

      return (
        <div className="max-w-6xl w-full mx-auto px-4 py-8 md:py-12 flex flex-col gap-8">
          {/* Header */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-violet-950/40 pb-6">
            <div>
              <span className="text-violet-400 font-semibold tracking-wider text-xs uppercase bg-violet-950/50 px-3 py-1 rounded-full border border-violet-800/40">UX Design Lab</span>
              <h1 className="text-2xl md:text-3xl font-bold mt-2 tracking-tight">Carousel Edge Fade-out</h1>
              <p className="text-slate-400 text-sm mt-1">Compare gradient masks against background-aware overlays on dark interfaces.</p>
            </div>
            <div className="flex gap-2 bg-[#100b30] p-1 rounded-lg border border-violet-950">
              <button 
                onClick={() => setFadeType('bad-white')}
                className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${fadeType === 'bad-white' ? 'bg-red-500/20 text-red-300 border border-red-500/30' : 'text-slate-400 hover:text-slate-200'}`}
              >
                White Fade (Bad)
              </button>
              <button 
                onClick={() => setFadeType('good-mask')}
                className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${fadeType === 'good-mask' ? 'bg-violet-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}
              >
                Mask Fade (Good)
              </button>
              <button 
                onClick={() => setFadeType('good-overlay')}
                className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${fadeType === 'good-overlay' ? 'bg-violet-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}
              >
                Overlay Fade (Good)
              </button>
            </div>
          </div>

          {/* Interactive Playground */}
          <div className="bg-[#0e092c] rounded-2xl border border-violet-900/30 p-6 md:p-8 flex flex-col gap-6 relative shadow-xl shadow-brand-dark/50">
            {/* Visualizer Area */}
            <div className="relative rounded-xl bg-[#08041d] p-8 border border-violet-950 overflow-hidden min-h-[280px] flex flex-col justify-center">
              
              {/* Background Grid Pattern */}
              <div className="absolute inset-0 bg-[linear-gradient(to_right,#0f0a2e_1px,transparent_1px),linear-gradient(to_bottom,#0f0a2e_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-30"></div>
              
              {/* Carousel Container */}
              <div className="relative w-full max-w-4xl mx-auto">
                {/* Left/Right Absolute Overlay simulation if 'good-overlay' is selected */}
                {fadeType === 'good-overlay' && (
                  <>
                    <div className="absolute left-0 top-0 bottom-0 w-16 bg-gradient-to-r from-[#08041d] to-transparent z-10 pointer-events-none transition-opacity duration-300"></div>
                    <div className="absolute right-0 top-0 bottom-0 w-16 bg-gradient-to-l from-[#08041d] to-transparent z-10 pointer-events-none transition-opacity duration-300"></div>
                  </>
                )}

                <div 
                  ref={scrollContainerRef}
                  onMouseEnter={() => setIsScrolling(false)}
                  onMouseLeave={() => setIsScrolling(true)}
                  style={getContainerStyles()}
                  className="w-[90%] mx-auto py-6 flex gap-4 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing transition-all duration-300"
                >
                  {demoCards.concat(demoCards).map((card, idx) => (
                    <div 
                      key={idx} 
                      className="min-w-[260px] max-w-[260px] bg-[#16103b] hover:bg-[#1a1444] rounded-xl p-5 border border-violet-900/40 hover:border-violet-700/50 shadow-lg flex flex-col justify-between h-[180px] transition-all duration-200 hover:-translate-y-0.5 group"
                    >
                      <div>
                        <div className="flex items-center text-[10px] font-bold text-violet-400 tracking-wider uppercase mb-3">
                          <SparklesIcon />
                          {card.category}
                        </div>
                        <h3 className="text-sm font-semibold text-slate-100 leading-snug group-hover:text-violet-200 transition-colors">
                          {card.title}
                        </h3>
                        <p className="text-xs text-slate-400 mt-2 line-clamp-2 leading-relaxed">
                          {card.subtitle}
                        </p>
                      </div>
                      <div className="border-t border-violet-950 pt-3 mt-4 flex items-center justify-between">
                        <span className="text-[10px] text-slate-500 bg-violet-950/60 px-2 py-0.5 rounded border border-violet-900/30 font-medium">
                          {card.tag}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Status Indicator */}
              <div className="absolute bottom-4 left-4 z-20 flex items-center gap-2">
                <span className="flex h-2 w-2 relative">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span className="text-[10px] font-mono text-slate-400">Hover over cards to pause auto-scroll</span>
              </div>
            </div>

            {/* Code and Explanation Layout */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-2">
              {/* Explanation Panel */}
              <div className="flex flex-col gap-4">
                <h2 className="text-lg font-bold flex items-center">
                  <EyeIcon /> Implementation Details
                </h2>
                
                {fadeType === 'bad-white' && (
                  <div className="bg-red-950/20 border border-red-900/30 p-4 rounded-xl text-sm leading-relaxed flex flex-col gap-3">
                    <div className="flex items-start">
                      <AlertIcon />
                      <div>
                        <strong className="text-red-300 block mb-1">Why this looks bad:</strong>
                        The wrapper or parent element has a hardcoded <code className="text-red-400 font-mono bg-red-950/40 px-1 py-0.5 rounded">background: #ffffff</code>. When the mask gradient fades out the container contents to transparent, it exposes the white background underneath, causing the visual "white striping" on a dark layout.
                      </div>
                    </div>
                  </div>
                )}

                {fadeType === 'good-mask' && (
                  <div className="bg-emerald-950/20 border border-emerald-900/30 p-4 rounded-xl text-sm leading-relaxed flex flex-col gap-3">
                    <div className="flex items-start">
                      <CheckIcon />
                      <div>
                        <strong className="text-emerald-300 block mb-1">Best Practices (Masking):</strong>
                        By setting the wrapper background to <code className="text-emerald-400 font-mono bg-emerald-950/40 px-1 py-0.5 rounded">transparent</code>, the mask works perfectly by revealing whatever dark backdrop is naturally behind the component.
                      </div>
                    </div>
                  </div>
                )}

                {fadeType === 'good-overlay' && (
                  <div className="bg-emerald-950/20 border border-emerald-900/30 p-4 rounded-xl text-sm leading-relaxed flex flex-col gap-3">
                    <div className="flex items-start">
                      <CheckIcon />
                      <div>
                        <strong className="text-emerald-300 block mb-1">Best Practices (Overlay):</strong>
                        Using absolute positioning with <code className="text-emerald-400 font-mono bg-emerald-950/40 px-1 py-0.5 rounded">::before</code> and <code className="text-emerald-400 font-mono bg-emerald-950/40 px-1 py-0.5 rounded">::after</code> pseudo-elements gives you explicit control. It mimics the fade using a gradient directly blending from your exact theme background color (<code className="font-mono text-emerald-300">#08041d</code>) to transparent.
                      </div>
                    </div>
                  </div>
                )}

                <div className="text-xs text-slate-400 flex flex-col gap-2 mt-2">
                  <span className="font-semibold text-slate-300">Tips for Emil-style Polish:</span>
                  <ul className="list-disc pl-4 space-y-1">
                    <li>Maintain low friction: cards trigger subtle transform effects on hover.</li>
                    <li>Avoid layout shifts: masks and overlays do not modify child card width or padding bounds.</li>
                    <li>Use touch-friendly styling: overlays use <code className="font-mono text-violet-400">pointer-events: none</code> so card hover and swipe gestures still work through the fade zones.</li>
                  </ul>
                </div>
              </div>

              {/* Code Panel */}
              <div className="flex flex-col gap-2">
                <h2 className="text-lg font-bold flex items-center">
                  <CodeIcon /> Styled-Component Code
                </h2>
                <div className="relative bg-[#050314] rounded-xl border border-violet-950 p-4 overflow-x-auto">
                  <pre className="text-xs text-violet-300 leading-relaxed font-mono whitespace-pre select-all">
                    {codeSnippets[fadeType]}
                  </pre>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
