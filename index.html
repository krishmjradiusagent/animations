<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Fade — Light Background</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-white text-slate-900 font-sans min-h-screen antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SparklesIcon = () => (
      <svg className="w-3.5 h-3.5 text-violet-500 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21L7.188 15.904L2 15L7.188 14.096L9 9L9.813 14.096L15 15L9.813 15.904z" />
      </svg>
    );

    const demoCards = [
      { category: "LANGUAGE", tag: "Language Support", title: "Can you communicate with my client in Mandarin Chinese?", subtitle: "Should I save this language preference as the default for all interactions with this client?" },
      { category: "COMMUNICATION", tag: "Client Communication", title: "Text my client a reminder about our meeting tomorrow at 3 PM", subtitle: "Would you like to include a property link or confirmation request?" },
      { category: "COMMUNICATION", tag: "Client Communication", title: "Email the BRBC to my client along with a brief explanation of the document", subtitle: "Would you like to add a personal note or video message to accompany the BRBC?" },
      { category: "CMA", tag: "CMA & Valuation", title: "Generate a quick home value estimate for an address my client is considering", subtitle: "Should I compare this estimate with Zestimate and other AVM tools?" },
      { category: "OFFERS", tag: "Offer Management", title: "Initiate an offer for a client who wants to bid on a listing", subtitle: "Should I notify you of feedback or a counter received?" },
      { category: "LEADS", tag: "Lead Intelligence", title: "Identify cold leads in my database that need outreach", subtitle: "Create a smart campaign for re-engagement?" },
    ];

    /* ── The two solution approaches ── */

    function MaskFadeCarousel({ cards, isScrolling, setIsScrolling }) {
      const ref = useRef(null);

      useEffect(() => {
        if (!isScrolling) return;
        const id = setInterval(() => {
          if (ref.current) {
            const { scrollLeft, scrollWidth, clientWidth } = ref.current;
            if (scrollLeft + clientWidth >= scrollWidth - 5) {
              ref.current.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
              ref.current.scrollBy({ left: 1.2, behavior: 'auto' });
            }
          }
        }, 30);
        return () => clearInterval(id);
      }, [isScrolling]);

      return (
        <div
          ref={ref}
          onMouseEnter={() => setIsScrolling(false)}
          onMouseLeave={() => setIsScrolling(true)}
          style={{
            WebkitMaskImage: 'linear-gradient(to right, transparent 0%, black 64px, black calc(100% - 64px), transparent 100%)',
            maskImage: 'linear-gradient(to right, transparent 0%, black 64px, black calc(100% - 64px), transparent 100%)',
          }}
          className="w-[92%] mx-auto py-5 flex gap-4 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"
        >
          {cards.map((card, i) => <Card key={i} card={card} />)}
        </div>
      );
    }

    function OverlayFadeCarousel({ cards, isScrolling, setIsScrolling }) {
      const ref = useRef(null);

      useEffect(() => {
        if (!isScrolling) return;
        const id = setInterval(() => {
          if (ref.current) {
            const { scrollLeft, scrollWidth, clientWidth } = ref.current;
            if (scrollLeft + clientWidth >= scrollWidth - 5) {
              ref.current.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
              ref.current.scrollBy({ left: 1.2, behavior: 'auto' });
            }
          }
        }, 30);
        return () => clearInterval(id);
      }, [isScrolling]);

      return (
        <div className="relative w-[92%] mx-auto">
          {/* Left fade overlay — matches white bg */}
          <div className="absolute left-0 top-0 bottom-0 w-16 bg-gradient-to-r from-white to-transparent z-10 pointer-events-none"></div>
          {/* Right fade overlay — matches white bg */}
          <div className="absolute right-0 top-0 bottom-0 w-16 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none"></div>

          <div
            ref={ref}
            onMouseEnter={() => setIsScrolling(false)}
            onMouseLeave={() => setIsScrolling(true)}
            className="py-5 flex gap-4 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"
          >
            {cards.map((card, i) => <Card key={i} card={card} />)}
          </div>
        </div>
      );
    }

    function Card({ card }) {
      return (
        <div className="min-w-[260px] max-w-[260px] bg-gradient-to-br from-violet-600 to-indigo-700 rounded-xl p-5 shadow-lg shadow-violet-200/40 flex flex-col justify-between h-[190px] group hover:-translate-y-0.5 transition-transform duration-200 cursor-pointer">
          <div>
            <div className="flex items-center text-[10px] font-bold text-violet-200/80 tracking-wider uppercase mb-2.5">
              <SparklesIcon />
              {card.category}
            </div>
            <p className="text-[10px] text-violet-300/70 mb-1">{card.tag}</p>
            <h3 className="text-[13px] font-semibold text-white leading-snug">
              {card.title}
            </h3>
            <p className="text-[11px] text-violet-200/60 mt-2 line-clamp-2 leading-relaxed italic">
              {card.subtitle}
            </p>
          </div>
        </div>
      );
    }

    /* ── Code snippets ── */

    const maskCode = `// Method A — CSS Mask (transparent bg, mask fades edges)
export const SuggestionCarousel = styled.div\`
  overflow: hidden;
  width: 92%;
  margin: 0 auto;
  box-sizing: border-box;
  padding: 20px 0 4px;

  /* Mask fades edges to transparent, revealing
     the parent's white background behind it */
  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 64px,
    black calc(100% - 64px),
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 64px,
    black calc(100% - 64px),
    transparent 100%
  );
\`

/* ⚠️ Make sure NO parent element between this
   component and the white page background
   sets its own opaque background color.
   The mask reveals whatever is behind it. */`;

    const overlayCode = `// Method B — Pseudo-element overlays (most reliable)
export const SuggestionCarousel = styled.div\`
  position: relative;
  overflow: hidden;
  width: 92%;
  margin: 0 auto;
  padding: 20px 0 4px;

  /* Left edge fade — match your page bg */
  &::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 64px;
    background: linear-gradient(
      to right, #ffffff 0%, transparent 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  /* Right edge fade — match your page bg */
  &::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 64px;
    background: linear-gradient(
      to left, #ffffff 0%, transparent 100%
    );
    z-index: 2;
    pointer-events: none;
  }
\`

/* Replace #ffffff with your exact page
   background color for a seamless blend.
   Works regardless of parent backgrounds. */`;

    function App() {
      const [method, setMethod] = useState('mask');
      const [isScrolling1, setIsScrolling1] = useState(true);
      const [isScrolling2, setIsScrolling2] = useState(true);
      const allCards = [...demoCards, ...demoCards];

      return (
        <div className="max-w-6xl mx-auto px-4 py-10 flex flex-col gap-10">

          {/* Header */}
          <div className="text-center">
            <span className="text-violet-600 font-semibold tracking-wider text-[11px] uppercase bg-violet-50 px-3 py-1 rounded-full border border-violet-200">Carousel Fade Demo</span>
            <h1 className="text-2xl font-bold mt-3 tracking-tight text-slate-900">Edge Fade on White Backgrounds</h1>
            <p className="text-slate-500 text-sm mt-1.5 max-w-md mx-auto">Two methods to seamlessly fade carousel edges into a white page background.</p>
          </div>

          {/* Toggle */}
          <div className="flex justify-center">
            <div className="flex gap-1 bg-slate-100 p-1 rounded-lg border border-slate-200">
              <button
                onClick={() => setMethod('mask')}
                className={`px-4 py-2 rounded-md text-xs font-semibold transition-all ${method === 'mask' ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
              >
                Method A — CSS Mask
              </button>
              <button
                onClick={() => setMethod('overlay')}
                className={`px-4 py-2 rounded-md text-xs font-semibold transition-all ${method === 'overlay' ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
              >
                Method B — Overlay
              </button>
            </div>
          </div>

          {/* Visual Preview */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="px-5 py-3 border-b border-slate-100 flex items-center gap-2">
              <span className="w-3 h-3 rounded-full bg-red-400"></span>
              <span className="w-3 h-3 rounded-full bg-amber-400"></span>
              <span className="w-3 h-3 rounded-full bg-emerald-400"></span>
              <span className="text-[11px] text-slate-400 font-mono ml-2">localhost:3000</span>
            </div>

            <div className="bg-white py-6">
              {method === 'mask'
                ? <MaskFadeCarousel cards={allCards} isScrolling={isScrolling1} setIsScrolling={setIsScrolling1} />
                : <OverlayFadeCarousel cards={allCards} isScrolling={isScrolling2} setIsScrolling={setIsScrolling2} />
              }
            </div>
          </div>

          {/* Code + Explanation */}
          <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">

            {/* Code — takes 3 cols */}
            <div className="lg:col-span-3 flex flex-col gap-2">
              <h2 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                <svg className="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" /></svg>
                Styled-Components Code
              </h2>
              <div className="bg-slate-950 rounded-xl border border-slate-800 p-5 overflow-x-auto">
                <pre className="text-xs text-slate-300 leading-relaxed font-mono whitespace-pre select-all">
                  {method === 'mask' ? maskCode : overlayCode}
                </pre>
              </div>
            </div>

            {/* Explanation — takes 2 cols */}
            <div className="lg:col-span-2 flex flex-col gap-4">
              <h2 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                <svg className="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.493 1.509 1.333 1.509 2.316V18" /></svg>
                How It Works
              </h2>

              {method === 'mask' ? (
                <div className="bg-violet-50 border border-violet-200 p-4 rounded-xl text-[13px] text-slate-700 leading-relaxed flex flex-col gap-3">
                  <p><strong className="text-violet-700">CSS Mask</strong> makes the carousel's left and right edges transparent. Since the carousel itself has no background, it reveals the white page background behind it — creating a seamless fade.</p>
                  <div className="flex items-start gap-2 bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800">
                    <svg className="w-4 h-4 text-amber-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" /></svg>
                    <span>If any parent between the carousel and the page sets an opaque background (like a card wrapper), the mask will reveal <em>that</em> color instead of white.</span>
                  </div>
                </div>
              ) : (
                <div className="bg-violet-50 border border-violet-200 p-4 rounded-xl text-[13px] text-slate-700 leading-relaxed flex flex-col gap-3">
                  <p><strong className="text-violet-700">Overlay Gradients</strong> place two absolute pseudo-elements on the left and right edges. Each fades from your exact page background color (<code className="font-mono text-violet-600 bg-violet-100 px-1 rounded">#ffffff</code>) to transparent.</p>
                  <div className="flex items-start gap-2 bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-xs text-emerald-800">
                    <svg className="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>Most reliable method — works regardless of parent backgrounds. Just match the gradient color to your page bg.</span>
                  </div>
                </div>
              )}

              <div className="text-xs text-slate-500 flex flex-col gap-1.5 border-t border-slate-100 pt-4">
                <span className="font-semibold text-slate-600">Key points:</span>
                <ul className="list-disc pl-4 space-y-1">
                  <li>Use <code className="font-mono text-violet-600">pointer-events: none</code> on overlays so cards remain interactive</li>
                  <li>64px fade width gives a smooth, premium transition</li>
                  <li>Both methods are GPU-accelerated — zero layout thrashing</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
